<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparar — CASABOURSE</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><span class="brand-icon">◈</span><span class="brand-name">CASA<span class="brand-accent">BOURSE</span></span></div>
        <ul class="nav-links">
            <li><a href="index.html">Mercado</a></li>
            <li><a href="stock.html">Análisis</a></li>
            <li><a href="compare.html" class="active">Comparar</a></li>
        </ul>
    </nav>
    
    <section class="compare-section">
        <div class="container">
            <h1>Comparar Empresas</h1>
            <div class="compare-controls">
                <select id="ticker1"><option>IAM</option><option>ATW</option><option>BCP</option><option>CIH</option><option>LBV</option><option>MNG</option><option>TQM</option></select>
                <span>vs</span>
                <select id="ticker2"><option selected>ATW</option><option>IAM</option><option>BCP</option><option>CIH</option><option>LBV</option><option>MNG</option><option>TQM</option></select>
            </div>
            <div class="chart-wrap"><canvas id="compareChart"></canvas></div>
            <table class="compare-table">
                <thead><tr><th>Métrica</th><th id="h1">IAM</th><th id="h2">ATW</th></tr></thead>
                <tbody id="compareBody"></tbody>
            </table>
        </div>
    </section>
    
    <script src="js/compare.js"></script>
</body>
</html>
